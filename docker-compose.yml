version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: merkato
      POSTGRES_PASSWORD: merkatopassword
      POSTGRES_DB: merkatomotors
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - merkato-network
      
  # API Gateway
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CRM_SERVICE_URL=http://crm-service:3001
      - VEHICLE_SERVICE_URL=http://vehicle-service:3002
      - FINANCE_SERVICE_URL=http://finance-service:3003
      - DEAL_SERVICE_URL=http://deal-service:3004
      - PARTNER_SERVICE_URL=http://partner-service:3005
      - LEAD_SERVICE_URL=http://lead-service:3006
      - ANALYTICS_SERVICE_URL=http://analytics-service:3007
    depends_on:
      - crm-service
      - vehicle-service
      - finance-service
      - deal-service
      - partner-service
      - lead-service
      - analytics-service
    networks:
      - merkato-network

  # CRM Service
  crm-service:
    build:
      context: ./apps/services/crm
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    networks:
      - merkato-network

  # Vehicle Service
  vehicle-service:
    build:
      context: ./apps/services/vehicle
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    networks:
      - merkato-network

  # Finance Service
  finance-service:
    build:
      context: ./apps/services/finance
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    networks:
      - merkato-network

  # Deal Service
  deal-service:
    build:
      context: ./apps/services/deal
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    networks:
      - merkato-network

  # Partner Service
  partner-service:
    build:
      context: ./apps/services/partner
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    networks:
      - merkato-network

  # Lead Service
  lead-service:
    build:
      context: ./apps/services/lead
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
    networks:
      - merkato-network

  # Analytics Service
  analytics-service:
    build:
      context: ./apps/services/analytics
      dockerfile: Dockerfile
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
    networks:
      - merkato-network

  # Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - merkato-network

networks:
  merkato-network:
    driver: bridge

volumes:
  postgres-data:
